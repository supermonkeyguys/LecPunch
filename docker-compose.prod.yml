services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    env_file:
      - ./deploy/mongo.env
    command: ["--auth"]
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ./deploy/api.env
    depends_on:
      - mongo
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mongo-data:
